{% extends "base.html" %}
{% block title %}Enviar Notificacion{% endblock %}
{% block content %}
<h2 style="margin-bottom: 1rem;">Enviar notificacion</h2>
<form method="POST" action="/dashboard/send">
    <div class="form-group">
        <label for="channel">Canal</label>
        <select name="channel" id="channel">
            <option value="email">Email</option>
            <option value="whatsapp">WhatsApp</option>
        </select>
    </div>
    <div class="form-group">
        <label for="user_id">User ID (opcional)</label>
        <input type="text" name="user_id" id="user_id" placeholder="UUID del usuario">
    </div>
    <div class="form-group">
        <label for="subject">Asunto</label>
        <input type="text" name="subject" id="subject" placeholder="Asunto del mensaje">
    </div>
    <div class="form-group">
        <label for="body">Mensaje</label>
        <textarea name="body" id="body" placeholder="Contenido del mensaje" required></textarea>
    </div>
    <button type="submit">Enviar</button>
</form>
{% endblock %}
