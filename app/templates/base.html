<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dashboard{% endblock %} - Notificaciones</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav>
        <h1>Notificaciones</h1>
        <a href="/dashboard/" class="{% if request.url.path == '/dashboard/' %}active{% endif %}">Resumen</a>
        <a href="/dashboard/send" class="{% if request.url.path == '/dashboard/send' %}active{% endif %}">Enviar</a>
        <a href="/dashboard/templates" class="{% if request.url.path == '/dashboard/templates' %}active{% endif %}">Templates</a>
        <a href="/dashboard/history" class="{% if request.url.path == '/dashboard/history' %}active{% endif %}">Historial</a>
        <a href="/dashboard/users" class="{% if request.url.path == '/dashboard/users' %}active{% endif %}">Usuarios</a>
        <span style="flex:1;"></span>
        <button id="btnPolling" onclick="togglePolling()" style="background:none;border:1px solid var(--text2);color:var(--text2);border-radius:6px;padding:4px 10px;cursor:pointer;font-size:0.8rem;">⏸ Detener</button>
        <a href="http://localhost:8000/docs" target="_blank" style="font-size:0.8rem;color:var(--text2);margin-left:10px;">API Docs</a>
        <form method="post" action="/logout" style="display:inline;margin-left:10px;">
            <button type="submit" style="background:none;border:1px solid var(--text2);color:var(--text2);border-radius:6px;padding:4px 10px;cursor:pointer;font-size:0.8rem;">Cerrar sesion</button>
        </form>
    </nav>
    <div class="container">
        {% if flash %}
        <div class="flash flash-{{ flash.type }}">{{ flash.message }}</div>
        {% endif %}
        {% block content %}{% endblock %}
    </div>
    <script>
    async function togglePolling() {
        const resp = await fetch('/polling/toggle', { method: 'POST' });
        const data = await resp.json();
        const btn = document.getElementById('btnPolling');
        btn.textContent = data.enabled ? '⏸ Detener' : '▶ Iniciar';
    }
    async function updatePollingStatus() {
        try {
            const resp = await fetch('/polling/status');
            const data = await resp.json();
            const btn = document.getElementById('btnPolling');
            if (btn) btn.textContent = data.enabled ? '⏸ Detener' : '▶ Iniciar';
        } catch {}
    }
    document.addEventListener('DOMContentLoaded', updatePollingStatus);
    </script>
</body>
</html>
